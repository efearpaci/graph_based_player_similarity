        <script type="text/javascript">

              // initialize global variables.

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#FFFFFF", "font": {"color": "white"}, "id": "Arsenal_LW", "label": "LW", "shape": "dot", "size": 15, "x": 250, "y": -200}, {"color": "#FFFFFF", "font": {"color": "white"}, "id": "Arsenal_AM", "label": "AM", "shape": "dot", "size": 15, "x": 150, "y": 0}, {"color": "#FFFFFF", "font": {"color": "white"}, "id": "Arsenal_RW", "label": "RW", "shape": "dot", "size": 15, "x": 250, "y": 200}, {"color": "#FFED00", "font": {"color": "white"}, "id": "Arsenal_ST", "label": "ST", "shape": "dot", "size": 25, "x": 350, "y": 0}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#4b5563", "from": "Arsenal_LW", "to": "Arsenal_ST", "value": 1.9185485560086517}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_LW", "to": "Arsenal_AM", "value": 1.0787887300989358}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_AM", "to": "Arsenal_ST", "value": 9.418463495005577}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_AM", "to": "Arsenal_LW", "value": 7.976537987631818}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_AM", "to": "Arsenal_RW", "value": 4.7210987646336955}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_RW", "to": "Arsenal_ST", "value": 1.1177076753983968}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_RW", "to": "Arsenal_AM", "value": 0.8602985274247512}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_ST", "to": "Arsenal_AM", "value": 0.5220936348883489}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_ST", "to": "Arsenal_LW", "value": 0.2800983003781578}, {"arrows": "to", "color": "#4b5563", "from": "Arsenal_ST", "to": "Arsenal_RW", "value": 0.45288580941757806}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {

    },
    "edges": {

        },
        "smooth": {

        }
    },
    "interaction": {

    },
    "physics": {

        "stabilization": {

            "fit": true,
            "iterations": 1000,

};
